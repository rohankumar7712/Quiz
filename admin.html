<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin | Quiz System</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#b8c6db 0%,#f5f7fa 100%);
      min-height:100vh;display:flex;justify-content:center;align-items:start;padding:2rem;
    }
    .container{
      background:#fff;padding:2rem;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.1);
      max-width:750px;width:100%;
    }
    .btn-purple{background:#8e44ad;color:#fff} .btn-purple:hover{background:#732d91}
    .error{color:#e74c3c;font-size:.95rem} .hidden{display:none}
  </style>
</head>
<body>
  <div class="container">

    <!-- Login -->
    <div id="loginBox">
      <h2 class="mb-3">Admin Login</h2>
      <input id="user" type="text" class="form-control mb-2" placeholder="Username">
      <input id="pass" type="password" class="form-control mb-3" placeholder="Password">
      <button id="loginBtn" class="btn btn-purple w-100">Login</button>
      <p id="loginErr" class="error mt-2"></p>
    </div>

    <!-- Builder -->
    <div id="builder" class="hidden mt-5">
      <h2 class="mb-3">Create a New Quiz</h2>
      <input id="quizTitle" type="text" class="form-control mb-3" placeholder="Quiz Title">

      <div class="row mb-3">
        <div class="col">
          <label class="form-label fw-bold">Start Date & Time</label>
          <input id="startDate" type="datetime-local" class="form-control">
        </div>
        <div class="col">
          <label class="form-label fw-bold">End Date & Time</label>
          <input id="endDate" type="datetime-local" class="form-control">
        </div>
      </div>

      <!-- Paste‑area -->
      <label class="form-label fw-bold">Paste Quiz Text (MCQ format)</label>
      <textarea id="quizText" rows="10" class="form-control mb-2"
        placeholder="1. Question text
A. Option A
B. Option B
C. Option C
D. Option D
Correct Answer: B"></textarea>
      <button id="generateBtn" class="btn btn-secondary w-100 mb-4">Generate Quiz from Text</button>

      <!-- Dynamic questions will appear here -->
      <div id="questions"></div>

      <div class="d-grid gap-2 mt-4">
        <button id="addQ" class="btn btn-purple">Add Question</button>
        <button id="saveQ" class="btn btn-success">Save & Get Code</button>
      </div>
      <p id="saveMsg" class="mt-3 text-success"></p>
    </div>

    <!-- History -->
    <div id="history" class="hidden mt-5">
      <h2>All Created Quizzes</h2>
      <button onclick="loadQuizHistory()" class="btn btn-outline-dark w-100 mt-2">Show Quiz History</button>
      <div id="quizList" class="mt-3"></div>
    </div>

  </div>

  <script src="js/admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
